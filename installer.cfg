[Application]
name=nanobot
version=0.1.4
entry_point=nanobot.__main__:main
console=true

[Python]
version=3.11.9
bitness=64

[Include]
packages = nanobot
    aiohttp
    loguru
    pydantic
    litellm
    tiktoken
    httpx
    click
    rich
    typer
    telegram
    botpy
    lark_oapi

files = nanobot/web/static
    nanobot/templates
    nanobot/skills
    nanobot/skillHub

[Build]
installer_name=nanobot-setup-0.1.4
